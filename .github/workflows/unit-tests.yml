name: Unit tests

on:
  push:
    branches: ["master"]
  pull_request:
    branches: ["master"]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: unit-tests-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  collect:
    name: Collect tests
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install test dependencies
        run: python -m pip install -e ".[testing]"

      - name: Collect test suite
        env:
          PYTHONHASHSEED: "0"
        run: python -m pytest --collect-only -q

  tests:
    name: Python ${{ matrix.python-version }} / ${{ matrix.os }}
    needs: collect
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
          - windows-latest
        python-version:
          - "3.10"
          - "3.11"
          - "3.12"
          - "3.13"

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install test dependencies
        run: python -m pip install -e ".[testing]"

      - name: Run unit tests
        env:
          PYTHONHASHSEED: "0"
        run: >-
          python -m pytest
          --cov=RosettaX
          --cov-report=xml:coverage.xml
          --cov-report=term-missing
          --cov-fail-under=55
          --json-report
          --json-report-file=test-results.json
          --maxfail=1

      - name: Upload coverage and test results
        if: always() && matrix.os == 'ubuntu-latest' && matrix.python-version == '3.13'
        uses: actions/upload-artifact@v4
        with:
          name: unit-test-results
          path: |
            coverage.xml
            test-results.json
            htmlcov/
          if-no-files-found: error

  package-smoke:
    name: Package smoke test
    needs: tests
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install package
        run: python -m pip install -e ".[testing]"

      - name: Verify package entry point and imports
        env:
          PYTHONHASHSEED: "0"
        run: |
          python -c "import RosettaX; import RosettaX.application; import RosettaX.workflow"
          python -m RosettaX --help
