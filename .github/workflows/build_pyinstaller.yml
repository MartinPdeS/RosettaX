name: Build PyInstaller Bundles

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            artifact-name: rosettax-linux-x86_64
            archive-name: RosettaX-linux-x86_64.zip
          - os: windows-latest
            artifact-name: rosettax-windows-x86_64
            archive-name: RosettaX-windows-x86_64.zip
          - os: macos-latest
            artifact-name: rosettax-macos
            archive-name: RosettaX-macos.zip

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install bundling dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[bundling]"

      - name: Build bundle
        run: pyinstaller rosettax.spec --clean

      - name: Archive bundle (Unix)
        if: runner.os != 'Windows'
        run: |
          cd dist
          zip -r "../${{ matrix.archive-name }}" rosettax

      - name: Archive bundle (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          Compress-Archive -Path dist/rosettax -DestinationPath "${{ matrix.archive-name }}" -Force

      - name: Upload bundle artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact-name }}
          path: ${{ matrix.archive-name }}
          if-no-files-found: error

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-latest
    env:
      GH_REPO: ${{ github.repository }}

    steps:
      - name: Download bundle artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets

      - name: Create release if needed
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release view "${{ github.ref_name }}" >/dev/null 2>&1 || \
          gh release create "${{ github.ref_name }}" \
            --title "${{ github.ref_name }}" \
            --generate-notes

      - name: Upload release assets
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mapfile -t release_archives < <(find release-assets -type f -name '*.zip' | sort)
          if [ "${#release_archives[@]}" -eq 0 ]; then
            echo "No release archives were found under release-assets"
            exit 1
          fi
          gh release upload "${{ github.ref_name }}" "${release_archives[@]}" --clobber
