name: Build PyInstaller Bundles

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            artifact-name: rosettax-linux-x86_64
          - os: windows-latest
            artifact-name: rosettax-windows-x86_64
          - os: macos-latest
            artifact-name: rosettax-macos

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install bundling dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[bundling]"

      - name: Build bundle
        run: pyinstaller rosettax.spec --clean

      - name: Upload bundle artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact-name }}
          path: dist/rosettax
          if-no-files-found: error
